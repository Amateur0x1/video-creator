<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #efe7d4;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="50"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-odyssey-define"
        class="scene"
        data-composition-id="02-odyssey-define"
        data-composition-src="compositions/frames/02-odyssey-define.html"
        data-start="5"
        data-duration="4"
        data-track-index="1"
      ></div>

      <div
        id="el-03-origin"
        class="scene"
        data-composition-id="03-origin"
        data-composition-src="compositions/frames/03-origin.html"
        data-start="9"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-04-belief"
        class="scene"
        data-composition-id="04-belief"
        data-composition-src="compositions/frames/04-belief.html"
        data-start="14"
        data-duration="5.5"
        data-track-index="1"
      ></div>

      <div
        id="el-05-action"
        class="scene"
        data-composition-id="05-action"
        data-composition-src="compositions/frames/05-action.html"
        data-start="19"
        data-duration="6.5"
        data-track-index="0"
      ></div>

      <div
        id="el-06-result"
        class="scene"
        data-composition-id="06-result"
        data-composition-src="compositions/frames/06-result.html"
        data-start="25"
        data-duration="5"
        data-track-index="1"
      ></div>

      <div
        id="el-07-indie-hard"
        class="scene"
        data-composition-id="07-indie-hard"
        data-composition-src="compositions/frames/07-indie-hard.html"
        data-start="30"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-08-opportunity"
        class="scene"
        data-composition-id="08-opportunity"
        data-composition-src="compositions/frames/08-opportunity.html"
        data-start="35"
        data-duration="5.5"
        data-track-index="1"
      ></div>

      <div
        id="el-09-now"
        class="scene"
        data-composition-id="09-now"
        data-composition-src="compositions/frames/09-now.html"
        data-start="40"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-10-landing"
        class="scene"
        data-composition-id="10-landing"
        data-composition-src="compositions/frames/10-landing.html"
        data-start="45"
        data-duration="5"
        data-track-index="1"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 5);
        tl.fromTo("#el-02-odyssey-define", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 5);
        tl.to("#el-03-origin", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 14);
        tl.fromTo("#el-04-belief", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 14);
        tl.to("#el-04-belief", { x: 1920, duration: 0.5, ease: "power3.inOut" }, 19);
        tl.fromTo("#el-05-action", { x: -1920, opacity: 1 }, { x: 0, duration: 0.5, ease: "power3.inOut" }, 19);
        tl.to("#el-05-action", { x: 1920, duration: 0.5, ease: "power3.inOut" }, 25);
        tl.fromTo("#el-06-result", { x: -1920, opacity: 1 }, { x: 0, duration: 0.5, ease: "power3.inOut" }, 25);
        tl.to("#el-07-indie-hard", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 35);
        tl.fromTo("#el-08-opportunity", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 35);
        tl.to("#el-08-opportunity", { y: -1080, duration: 0.5, ease: "power3.inOut" }, 40);
        tl.fromTo("#el-09-now", { y: 1080, opacity: 1 }, { y: 0, duration: 0.5, ease: "power3.inOut" }, 40);
        tl.to("#el-09-now", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 45);
        tl.fromTo("#el-10-landing", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 45);
        tl.to({}, { duration: 50 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
