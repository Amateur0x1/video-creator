<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root {
          position: absolute; inset: 0;
          width: 1920px; height: 1080px;
          overflow: hidden; container-type: size;
        }
        .topbar {
          position: absolute; top: 28px; left: 96px; right: 96px;
          display: flex; justify-content: space-between; align-items: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 22px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #8a7a6a; opacity: 0;
        }
        /* 左侧：公式区 */
        .left-formula {
          position: absolute; left: 96px; top: 160px; width: 780px;
          opacity: 0;
        }
        .formula-label {
          font-family: 'JetBrains Mono', monospace;
          font-size: 20px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #8a7a6a; margin-bottom: 20px;
        }
        .formula-main {
          font-family: 'Noto Serif SC', serif;
          font-size: 80px; font-weight: 500; color: #3a2a1a;
          line-height: 1.1; letter-spacing: -0.02em;
        }
        .formula-result {
          display: inline-block;
          font-family: 'Noto Serif SC', serif;
          font-size: 108px; font-weight: 500; color: #e85c7a;
          letter-spacing: -0.02em; opacity: 0;
        }
        .formula-note {
          font-family: 'Noto Serif SC', serif;
          font-size: 34px; font-weight: 400; color: #8a7a6a;
          margin-top: 20px; line-height: 1.5;
          opacity: 0;
        }
        /* 右侧：四格 tile */
        .tiles-grid {
          position: absolute; right: 96px; top: 140px;
          width: 820px;
          display: grid; grid-template-columns: 1fr 1fr;
          gap: 16px;
        }
        .tile {
          border-radius: 8px; padding: 28px 24px; opacity: 0;
        }
        .tile-label {
          font-family: 'JetBrains Mono', monospace;
          font-size: 18px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
          margin-bottom: 10px;
        }
        .tile-title {
          font-family: 'Noto Serif SC', serif;
          font-size: 52px; font-weight: 500; line-height: 1.05;
        }
        .tile-note {
          font-family: 'JetBrains Mono', monospace;
          font-size: 16px; font-weight: 500; letter-spacing: 0.1em;
          margin-top: 6px; line-height: 1.4;
        }
        /* 温暖奶油配色的 tile 变体 */
        .t-warm { background:#3a2a1a; }
        .t-warm .tile-label { color:#e85c7a; }
        .t-warm .tile-title { color:#fcf6ee; }
        .t-pink { background:#e85c7a; }
        .t-pink .tile-label { color:#fcf6ee; }
        .t-pink .tile-title { color:#fcf6ee; }
        .t-mid { background:#6b4c3b; }
        .t-mid .tile-label { color:#e85c7a; }
        .t-mid .tile-title { color:#fcf6ee; }
        .t-cream { background:#f5ede0; border:2px solid #c8bfb0; }
        .t-cream .tile-label { color:#8a7a6a; }
        .t-cream .tile-title { color:#3a2a1a; }
        /* 竖向分隔线 */
        .divider-v {
          position: absolute; left: 969px; top: 120px;
          width: 2px; height: 0; background: #e0d4c8;
        }
      </style>

      <div id="root" data-composition-id="05-action" data-width="1920" data-height="1080">
        <!-- bg.png 底纹背景 -->
        <div id="bg-05" class="clip" data-start="0" data-duration="6" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-05" class="clip" data-start="0" data-duration="6" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.55);"></div>

        <div class="clip topbar" id="topbar-05" data-start="0" data-duration="6" data-track-index="2">
          <span>ACTION</span><span>05 / 10</span>
        </div>

        <!-- 竖分隔线 -->
        <div class="clip divider-v" id="div-05" data-start="0" data-duration="6" data-track-index="3"></div>

        <!-- 左侧公式 -->
        <div class="clip left-formula" id="left-05" data-start="0" data-duration="6" data-track-index="4">
          <div class="formula-label">THE CALCULATION</div>
          <div class="formula-main">大学 4 年 ÷ 4 =&thinsp;<span class="formula-result" id="fr-05">1 年</span></div>
          <div class="formula-note" id="fn-05">用四分之一时间备战秋招<br>极限，但合理</div>
        </div>

        <!-- 右侧 tile 网格 -->
        <div class="clip tiles-grid" id="tiles-05" data-start="0" data-duration="6" data-track-index="5">
          <div class="tile t-warm" id="ta">
            <div class="tile-label">DAILY</div>
            <div class="tile-title">咖啡馆</div>
            <div class="tile-note" style="color:#c8bfb0;">INTJ 老板 · 早九晚十一</div>
          </div>
          <div class="tile t-pink" id="tb">
            <div class="tile-label">WEEKLY</div>
            <div class="tile-title">读书会</div>
            <div class="tile-note" style="color:#fcf6ee;">海德格尔 · 德勒兹</div>
          </div>
          <div class="tile t-mid" id="tc">
            <div class="tile-label">FOCUS</div>
            <div class="tile-title">代码</div>
            <div class="tile-note" style="color:#c8bfb0;">无用知识 + 有用技术</div>
          </div>
          <div class="tile t-cream" id="td">
            <div class="tile-label">BONUS</div>
            <div class="tile-title">女朋友</div>
            <div class="tile-note" style="color:#8a7a6a;">在读书会遇到的 💫</div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-05', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#div-05', { height:0 }, { height:820, duration:0.5, ease:'power2.inOut' }, 0.3);

        // 左侧公式入场
        tl.fromTo('#left-05', { opacity:0, x:-30 }, { opacity:1, x:0, duration:0.5, ease:'power3.out' }, 0.6);
        // "1年" spring-pop payoff
        tl.fromTo('#fr-05', { opacity:0, scale:0.3 }, { opacity:1, scale:1, duration:0.38, ease:'power3.out' }, 1.5);
        // 注释
        tl.fromTo('#fn-05', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 2.0);

        // 右侧 tiles 级联入场
        ['#ta','#tb','#tc','#td'].forEach((id, i) => {
          tl.fromTo(id,
            { opacity:0, y:28, scale:0.92 },
            { opacity:1, y:0, scale:1, duration:0.38, ease:'power3.out' },
            2.5 + i * 0.32
          );
        });

        // jitter on "1年"
        tl.to('#fr-05', { y:-4, duration:0.2, ease:'sine.inOut', yoyo:true, repeat:3 }, 5.2);

        window.__timelines['05-action'] = tl;
      </script>
    </template>
  </body>
</html>
