<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root {
          position: absolute; inset: 0;
          width: 1920px; height: 1080px;
          overflow: hidden; container-type: size;
        }
        .topbar {
          position: absolute; top: 28px; left: 96px; right: 96px;
          display: flex; justify-content: space-between; align-items: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 22px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #8a7a6a; opacity: 0;
        }
        /* 左：大数字 NOW */
        .left-now {
          position: absolute; left: 96px; top: 150px; width: 700px;
          opacity: 0;
        }
        .now-label {
          font-family: 'JetBrains Mono', monospace;
          font-size: 20px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #8a7a6a; margin-bottom: 16px;
        }
        .now-text {
          font-family: 'Noto Serif SC', serif;
          font-size: 168px; font-weight: 500; color: #3a2a1a;
          line-height: 0.9; letter-spacing: -0.04em;
        }
        .now-sub {
          font-family: 'Noto Serif SC', serif;
          font-size: 40px; font-weight: 400; color: #8a7a6a;
          margin-top: 20px; line-height: 1.5;
        }
        /* 右：三行 insight 横版 */
        .right-insights {
          position: absolute; right: 96px; top: 140px; width: 870px;
        }
        .insight-row {
          border-radius: 8px; padding: 28px 32px; margin-bottom: 16px;
          opacity: 0;
        }
        .ins-num {
          font-family: 'JetBrains Mono', monospace;
          font-size: 18px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
          margin-bottom: 6px;
        }
        .ins-text {
          font-family: 'Noto Serif SC', serif;
          font-size: 42px; font-weight: 500; line-height: 1.25;
        }
        /* 温暖奶油配色的三行 */
        .ir-1 { background:#3a2a1a; }
        .ir-1 .ins-num { color:#e85c7a; }
        .ir-1 .ins-text { color:#fcf6ee; }
        .ir-2 { background:#e85c7a; }
        .ir-2 .ins-num { color:#fcf6ee; }
        .ir-2 .ins-text { color:#fcf6ee; }
        .ir-3 { background:#f5ede0; border:2.5px solid #e0d4c8; }
        .ir-3 .ins-num { color:#8a7a6a; }
        .ir-3 .ins-text { color:#3a2a1a; }
        .divider-v {
          position: absolute; left: 900px; top: 120px;
          width: 2px; height: 0; background: #e0d4c8;
        }
      </style>

      <div id="root" data-composition-id="09-now" data-width="1920" data-height="1080">
        <!-- bg.png 底纹背景 -->
        <div id="bg-09" class="clip" data-start="0" data-duration="5" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-09" class="clip" data-start="0" data-duration="5" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.55);"></div>

        <div class="clip topbar" id="topbar-09" data-start="0" data-duration="5" data-track-index="2">
          <span>NOW</span><span>09 / 10</span>
        </div>

        <div class="clip divider-v" id="div-09" data-start="0" data-duration="5" data-track-index="3"></div>

        <!-- 左侧 NOW 大字 -->
        <div class="clip left-now" id="lnow-09" data-start="0" data-duration="5" data-track-index="4">
          <div class="now-label">STATUS</div>
          <div class="now-text">现<br>在</div>
          <div class="now-sub">被迫走向<br><span style="color:#e85c7a;">遍地开花</span></div>
        </div>

        <!-- 右侧三条 insight -->
        <div class="clip right-insights" id="ri-09" data-start="0" data-duration="5" data-track-index="5"
             style="position:absolute;right:96px;top:140px;width:870px;">
          <div class="insight-row ir-1" id="ins1">
            <div class="ins-num">DAY JOB</div>
            <div class="ins-text">白天大厂工作<br>晚上独立开发</div>
          </div>
          <div class="insight-row ir-2" id="ins2">
            <div class="ins-num">HUSTLE</div>
            <div class="ins-text">内容 · 设计 · 代码 · 增长</div>
          </div>
          <div class="insight-row ir-3" id="ins3">
            <div class="ins-num">FEELING</div>
            <div class="ins-text">很累，但挺充实</div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-09', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#div-09', { height:0 }, { height:820, duration:0.45, ease:'power2.inOut' }, 0.3);

        tl.fromTo('#lnow-09', { opacity:0, x:-30 }, { opacity:1, x:0, duration:0.55, ease:'power3.out' }, 0.65);

        ['#ins1','#ins2','#ins3'].forEach((id, i) => {
          tl.fromTo(id,
            { opacity:0, x:40, scale:0.95 },
            { opacity:1, x:0, scale:1, duration:0.42, ease:'power3.out' },
            1.1 + i * 0.38
          );
        });

        // subtle jitter on "ins3"
        tl.to('#ins3', { y:-3, duration:0.2, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.1);

        window.__timelines['09-now'] = tl;
      </script>
    </template>
  </body>
</html>
