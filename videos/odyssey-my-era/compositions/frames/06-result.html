<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root {
          position: absolute; inset: 0;
          width: 1920px; height: 1080px;
          overflow: hidden; container-type: size;
        }
        .topbar {
          position: absolute; top: 28px; left: 96px; right: 96px;
          display: flex; justify-content: space-between; align-items: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 22px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #8a7a6a; opacity: 0;
        }
        /* 横向时间轴 */
        .timeline-h {
          position: absolute; left: 96px; right: 96px; top: 420px;
          height: 2px; background: #c8bfb0;
          width: 0;
        }
        .station {
          position: absolute; top: 260px; text-align: center;
          opacity: 0;
        }
        .node-dot {
          width: 36px; height: 36px; border-radius: 50%;
          background: #e85c7a; margin: 0 auto 14px;
          position: relative;
        }
        .node-glow {
          position: absolute; inset: -10px; border-radius: 50%;
          background: radial-gradient(circle, rgba(232,92,122,0.45) 0%, transparent 70%);
          opacity: 0;
        }
        .st-mono {
          font-family: 'JetBrains Mono', monospace;
          font-size: 17px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
          color: #8a7a6a; margin-bottom: 8px;
        }
        .st-name {
          font-family: 'Noto Serif SC', serif;
          font-size: 60px; font-weight: 500; color: #3a2a1a;
          line-height: 1.0; letter-spacing: -0.01em;
        }
        /* 连接节点到横线的竖线 */
        .node-line {
          position: absolute; top: 378px;
          width: 2px; height: 0;
          background: #c8bfb0; left: 50%; transform: translateX(-50%);
        }
        .honest-note {
          position: absolute; left: 96px; right: 96px; bottom: 88px;
          text-align: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 20px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
          color: #8a7a6a; opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="06-result" data-width="1920" data-height="1080">
        <!-- bg.png 底纹背景 -->
        <div id="bg-06" class="clip" data-start="0" data-duration="5" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-06" class="clip" data-start="0" data-duration="5" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.60);"></div>

        <div class="clip topbar" id="topbar-06" data-start="0" data-duration="5" data-track-index="2">
          <span>RESULT</span><span>06 / 10</span>
        </div>

        <!-- 横向时间轴线 -->
        <div class="clip timeline-h" id="tl-h" data-start="0" data-duration="5" data-track-index="3"></div>

        <div class="clip station" id="st1" data-start="0" data-duration="5" data-track-index="4"
             style="left:150px; width:250px;">
          <div class="node-dot"><div class="node-glow" id="g1"></div></div>
          <div class="st-mono">PHASE 01</div>
          <div class="st-name">半年自学</div>
        </div>
        <div class="clip node-line" id="nl1" data-start="0" data-duration="5" data-track-index="5"
             style="left:275px;"></div>

        <div class="clip station" id="st2" data-start="0" data-duration="5" data-track-index="6"
             style="left:560px; width:250px;">
          <div class="node-dot"><div class="node-glow" id="g2"></div></div>
          <div class="st-mono">PHASE 02</div>
          <div class="st-name">黑客松</div>
        </div>
        <div class="clip node-line" id="nl2" data-start="0" data-duration="5" data-track-index="7"
             style="left:685px;"></div>

        <div class="clip station" id="st3" data-start="0" data-duration="5" data-track-index="8"
             style="left:980px; width:260px;">
          <div class="node-dot"><div class="node-glow" id="g3"></div></div>
          <div class="st-mono">PHASE 03</div>
          <div class="st-name">实习 Offer</div>
        </div>
        <div class="clip node-line" id="nl3" data-start="0" data-duration="5" data-track-index="9"
             style="left:1110px;"></div>

        <div class="clip station" id="st4" data-start="0" data-duration="5" data-track-index="10"
             style="left:1400px; width:280px;">
          <div class="node-dot"><div class="node-glow" id="g4"></div></div>
          <div class="st-mono">PHASE 04</div>
          <div class="st-name" id="st4name">上岸大厂</div>
        </div>
        <div class="clip node-line" id="nl4" data-start="0" data-duration="5" data-track-index="11"
             style="left:1540px;"></div>

        <div class="clip honest-note" id="honest-06" data-start="0" data-duration="5" data-track-index="12">
          运气太好了 · 好导师 · 顺利保研 · 两年缓冲期
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-06', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);

        // 横向时间轴线从左绘向右
        tl.fromTo('#tl-h', { width:0 }, { width:1728, duration:1.6, ease:'power2.inOut' }, 0.5);

        // 节点竖线 + 站点依次出现
        const nodes = [
          { st:'#st1', nl:'#nl1', g:'#g1' },
          { st:'#st2', nl:'#nl2', g:'#g2' },
          { st:'#st3', nl:'#nl3', g:'#g3' },
          { st:'#st4', nl:'#nl4', g:'#g4' },
        ];
        nodes.forEach(({ st, nl, g }, i) => {
          const t = 0.8 + i * 0.42;
          tl.fromTo(nl, { height:0 }, { height:42, duration:0.25, ease:'power2.out' }, t);
          tl.fromTo(st, { opacity:0, y:-20 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, t + 0.1);
        });

        // 最后节点 glow bloom + 颜色
        tl.fromTo('#g4', { opacity:0, scale:0.5 }, { opacity:1, scale:1, duration:0.55, ease:'power2.out' }, 2.85);
        tl.to('#st4name', { color:'#e85c7a', duration:0.3, ease:'power2.out' }, 3.05);

        // honest note
        tl.fromTo('#honest-06', { opacity:0, y:10 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 3.5);

        // jitter on glow
        tl.to('#g4', { scale:1.2, duration:0.3, ease:'sine.inOut', yoyo:true, repeat:2 }, 4.2);

        window.__timelines['06-result'] = tl;
      </script>
    </template>
  </body>
</html>
