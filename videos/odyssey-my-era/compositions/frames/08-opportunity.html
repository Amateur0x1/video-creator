      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-08', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);

        // comparison-split：两侧从各自方向 3D 滑入

          { opacity:1, x:0, rotationY:0, duration:0.55, ease:'power3.out', transformOrigin:'right center' },

          { opacity:1, x:0, rotationY:0, duration:0.55, ease:'power3.out', transformOrigin:'left center' },
          1.45
        );

        // pill spring-pop
        tl.fromTo('#pill-08',
          { opacity:0, scale:0.3 },
          { opacity:1, scale:1, duration:0.38, ease:'power3.out' },
          2.15
        );

        tl.fromTo('#appnote-08', { opacity:0, y:10 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 3.0);

        // jitter on pill
        tl.to('#pill-08', { y:-4, duration:0.2, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.2);

        window.__timelines['08-opportunity'] = tl;
