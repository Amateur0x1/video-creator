<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root {
          position: absolute; inset: 0;
          width: 1920px; height: 1080px;
          overflow: hidden; container-type: size;
        }
        /* 全屏深棕结尾页 */
        .eyebrow {
          position: absolute; left: 0; right: 0; top: 260px;
          text-align: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 22px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase;
          color: #c8bfb0; opacity: 0;
        }
        .main-msg {
          position: absolute; left: 0; right: 0; top: 328px;
          text-align: center;
          font-family: 'Noto Serif SC', serif;
          font-size: 88px; font-weight: 500; color: #fcf6ee;
          line-height: 1.25; letter-spacing: -0.02em; opacity: 0;
        }
        .main-msg .coral { color: #e85c7a; }
        .rule-h {
          position: absolute; left: 680px; top: 672px;
          height: 2px; background: #e85c7a; width: 0;
        }
        .handle {
          position: absolute; left: 0; right: 0; top: 706px;
          text-align: center;
          font-family: 'JetBrains Mono', monospace;
          font-size: 28px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
          color: #e85c7a; opacity: 0;
        }
        .followup {
          position: absolute; left: 0; right: 0; top: 772px;
          text-align: center;
          font-family: 'Noto Serif SC', serif;
          font-size: 38px; font-weight: 400; color: #c8bfb0;
          opacity: 0;
        }
        /* 左右装饰横线 */
        .deco-left {
          position: absolute; left: 96px; top: 540px;
          width: 0; height: 2px; background: #6b4c3b;
        }
        .deco-right {
          position: absolute; right: 96px; top: 540px;
          width: 0; height: 2px; background: #6b4c3b;
        }
        /* 四角装饰 */
        .corner {
          position: absolute; width: 32px; height: 32px;
          border-color: #6b4c3b; border-style: solid;
          opacity: 0;
        }
        .corner-tl { top: 48px; left: 64px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 48px; right: 64px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 48px; left: 64px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 48px; right: 64px; border-width: 0 2px 2px 0; }
      </style>

      <div id="root" data-composition-id="10-landing" data-width="1920" data-height="1080">
        <!-- bg.png 底纹叠加在深棕底色上 -->
        <div id="bg-10" class="clip" data-start="0" data-duration="6" data-track-index="0"
             style="position:absolute;inset:0;background:#3a2a1a;"></div>
        <div id="bgtex-10" class="clip" data-start="0" data-duration="6" data-track-index="1"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;opacity:0.12;"></div>

        <!-- 四角装饰 -->
        <div class="clip corner corner-tl" id="ctl" data-start="0" data-duration="6" data-track-index="2"></div>
        <div class="clip corner corner-tr" id="ctr" data-start="0" data-duration="6" data-track-index="3"></div>
        <div class="clip corner corner-bl" id="cbl" data-start="0" data-duration="6" data-track-index="4"></div>
        <div class="clip corner corner-br" id="cbr" data-start="0" data-duration="6" data-track-index="5"></div>

        <!-- 左右装饰横线 -->
        <div class="clip deco-left" id="dl-10" data-start="0" data-duration="6" data-track-index="6"></div>
        <div class="clip deco-right" id="dr-10" data-start="0" data-duration="6" data-track-index="7"></div>

        <div class="clip eyebrow" id="ey-10" data-start="0" data-duration="6" data-track-index="8">DREAMER PIGGY · MY ODYSSEY ERA</div>

        <div class="clip main-msg" id="mm-10" data-start="0" data-duration="6" data-track-index="9">
          不知道去哪<br>
          就先动起来<br>
          <span class="coral">你的奥德赛也是。</span>
        </div>

        <div class="clip rule-h" id="rh-10" data-start="0" data-duration="6" data-track-index="10"></div>
        <div class="clip handle" id="hd-10" data-start="0" data-duration="6" data-track-index="11">@DREAMER PIGGY</div>
        <div class="clip followup" id="fu-10" data-start="0" data-duration="6" data-track-index="12">分享你的奥德赛时期 👇</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 四角装饰入场
        ['#ctl','#ctr','#cbl','#cbr'].forEach((id, i) => {
          tl.fromTo(id, { opacity:0, scale:0.5 }, { opacity:1, scale:1, duration:0.35, ease:'power3.out' }, 0.2 + i * 0.08);
        });

        // 左右装饰横线从外向中心延伸
        tl.fromTo('#dl-10', { width:0 }, { width:300, duration:0.5, ease:'power2.inOut' }, 0.55);
        tl.fromTo('#dr-10', { width:0 }, { width:300, duration:0.5, ease:'power2.inOut' }, 0.55);

        // eyebrow
        tl.fromTo('#ey-10', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 0.85);

        // main message slide-up crossfade
        tl.fromTo('#mm-10', { opacity:0, y:40 }, { opacity:1, y:0, duration:0.65, ease:'power3.out' }, 1.3);

        // coral 横线绘出
        tl.fromTo('#rh-10', { width:0 }, { width:560, duration:0.5, ease:'power2.out' }, 2.2);

        // handle & followup
        tl.fromTo('#hd-10', { opacity:0, y:10 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 2.85);
        tl.fromTo('#fu-10', { opacity:0, y:10 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 3.3);

        window.__timelines['10-landing'] = tl;
      </script>
    </template>
  </body>
</html>
