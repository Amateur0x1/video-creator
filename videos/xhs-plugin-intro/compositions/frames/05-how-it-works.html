<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        .topbar {
          position:absolute;top:32px;left:96px;right:96px;
          display:flex;justify-content:space-between;align-items:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        .section-title {
          position:absolute;left:96px;top:140px;
          font-family:'Noto Serif SC',serif;font-size:48px;font-weight:500;
          color:#3a2a1a;letter-spacing:-0.01em;opacity:0;

        /* 三步骤横向时间轴 */
        .steps-wrap {
          position:absolute;left:96px;right:96px;top:260px;
          display:flex;align-items:flex-start;gap:0;

        .step-block {
          flex:1;text-align:center;opacity:0;position:relative;

        }
        .step-icon { font-size:72px;display:block;margin-bottom:24px; }
        .step-name {
          font-family:'Noto Serif SC',serif;font-size:60px;font-weight:500;
          color:#3a2a1a;line-height:1.0;letter-spacing:-0.01em;
        }
        .step-desc {
          font-family:'Noto Serif SC',serif;font-size:28px;font-weight:400;
          color:#6a5a4a;margin-top:12px;line-height:1.5;
        }
        /* 箭头连接 */
        .step-arrow {
          position:absolute;top:100px;right:-40px;
          font-size:48px;color:#e0c8c0;opacity:0;
          z-index:2;
        }
        /* 横向时间轴线 */

          color:#6a5a4a;opacity:0;

      <div id="root" data-composition-id="05-how-it-works" data-width="1920" data-height="1080">

        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-05', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
