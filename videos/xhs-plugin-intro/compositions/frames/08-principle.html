<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        .topbar {
          position:absolute;top:32px;left:96px;right:96px;
          display:flex;justify-content:space-between;align-items:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        .eyebrow {
          position:absolute;left:0;right:0;top:200px;
          text-align:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.18em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        .principle-wrap {
          position:absolute;left:96px;right:96px;top:270px;
        }
        .p-line {
          display:flex;align-items:center;gap:28px;
          margin-bottom:44px;opacity:0;
        }
        .p-check {
          width:52px;height:52px;border-radius:50%;
          background:#5a9c5a;color:#f0f8f0;
          display:flex;align-items:center;justify-content:center;
          font-size:28px;flex-shrink:0;
        }
        .p-text {
          font-family:'Noto Serif SC',serif;font-size:64px;font-weight:500;
          color:#3a2a1a;line-height:1.0;letter-spacing:-0.01em;
        }
        .p-text.highlight { color:#e85c7a; }
        .rule-h {
          position:absolute;left:480px;bottom:120px;
          height:2px;background:#e0d4c8;width:0;
        }
        .closing {
          position:absolute;left:0;right:0;bottom:68px;
          text-align:center;
          font-family:'Noto Serif SC',serif;font-size:34px;font-weight:400;
          color:#6a5a4a;opacity:0;
        }
        .closing span { color:#e85c7a;font-weight:500; }
      </style>

      <div id="root" data-composition-id="08-principle" data-width="1920" data-height="1080">
        <div id="bg-08" class="clip" data-start="0" data-duration="5" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-08" class="clip" data-start="0" data-duration="5" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.6);"></div>

        <div class="clip topbar" id="topbar-08" data-start="0" data-duration="5" data-track-index="2">
          <span>OUR PRINCIPLE</span><span>08 / 10</span>
        </div>

        <div class="clip eyebrow" id="ey-08" data-start="0" data-duration="5" data-track-index="3">我们的原则很明确</div>

        <div class="clip principle-wrap" id="pwrap-08" data-start="0" data-duration="5" data-track-index="4"
             style="position:absolute;left:96px;right:96px;top:310px;">
          <div class="p-line" id="pl1">
            <div class="p-check">✓</div>
            <div class="p-text">不做<span style="color:#c0b0a0;">主动批量采集</span></div>
          </div>
          <div class="p-line" id="pl2">
            <div class="p-check">✓</div>
            <div class="p-text">不<span style="color:#c0b0a0;">绕过平台规则</span></div>
          </div>
          <div class="p-line" id="pl3">
            <div class="p-check" style="background:#e85c7a;color:#fff5f0;">✓</div>
            <div class="p-text highlight">只沉淀你已筛选过的内容</div>
          </div>
        </div>

        <div class="clip rule-h" id="rh-08" data-start="0" data-duration="5" data-track-index="5"></div>
        <div class="clip closing" id="closing-08" data-start="0" data-duration="5" data-track-index="6">
          最终目的：<span>帮你更好地做内容分析，更系统地复盘账号</span>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-08', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#ey-08', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 0.6);

        ['#pl1','#pl2','#pl3'].forEach((id, i) => {
          tl.fromTo(id, { opacity:0, x:-28 }, { opacity:1, x:0, duration:0.42, ease:'power3.out' }, 1.0 + i * 0.42);
        });

        tl.fromTo('#rh-08', { width:0 }, { width:960, duration:0.5, ease:'power2.out' }, 2.55);
        tl.fromTo('#closing-08', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.42, ease:'power3.out' }, 3.15);
        tl.to('#pl3', { x:4, duration:0.2, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.1);

        window.__timelines['08-principle'] = tl;
      </script>
    </template>
  </body>
</html>
