<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        .topbar {
          position:absolute;top:32px;left:96px;right:96px;
          display:flex;justify-content:space-between;align-items:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        .section-title {
          position:absolute;left:96px;top:140px;
          font-family:'Noto Serif SC',serif;font-size:52px;font-weight:500;color:#3a2a1a;
          line-height:1.1;letter-spacing:-0.01em;opacity:0;
        }
        .section-title span { color:#e85c7a; }
        .tiles-grid {
          position:absolute;left:96px;right:96px;top:250px;
          display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:20px;
        }
        .tile {
          border-radius:16px;padding:36px 28px;opacity:0;
          position:relative;
        }
        .tile-icon { font-size:48px;margin-bottom:16px;display:block; }
        .tile-label {
          font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500;
          letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px;
        }
        .tile-title {
          font-family:'Noto Serif SC',serif;font-size:44px;font-weight:500;line-height:1.05;
        }
        .tile-desc {
          font-family:'Noto Serif SC',serif;font-size:24px;font-weight:400;
          margin-top:10px;line-height:1.4;
        }
        .t1 { background:#3a2a1a; }
        .t1 .tile-label,.t1 .tile-title { color:#f5ece0; }
        .t1 .tile-desc { color:#c8b8a8; }
        .t2 { background:#e85c7a; }
        .t2 .tile-label,.t2 .tile-title,.t2 .tile-desc { color:#fff5f0; }
        .t3 { background:#8b6bbf; }
        .t3 .tile-label,.t3 .tile-title,.t3 .tile-desc { color:#f0ecf8; }
        .t4 { background:#f5ece0;border:2.5px solid #3a2a1a; }
        .t4 .tile-label { color:#8a7a6a; }
        .t4 .tile-title { color:#3a2a1a; }
        .t4 .tile-desc { color:#6a5a4a; }
      </style>

      <div id="root" data-composition-id="02-pain-point" data-width="1920" data-height="1080">
        <div id="bg-02" class="clip" data-start="0" data-duration="5" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-02" class="clip" data-start="0" data-duration="5" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.55);"></div>

        <div class="clip topbar" id="topbar-02" data-start="0" data-duration="5" data-track-index="2">
          <span>你需要什么</span><span>02 / 10</span>
        </div>

        <div class="clip section-title" id="stitle-02" data-start="0" data-duration="5" data-track-index="3">
          做内容需要<span>四种视角</span>
        </div>

        <div class="clip tiles-grid" id="tgrid-02" data-start="0" data-duration="5" data-track-index="4"
             style="position:absolute;left:96px;right:96px;top:270px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:20px;">
          <div class="tile t1" id="t2a">
            <span class="tile-icon">📊</span>
            <div class="tile-label">SELF</div>
            <div class="tile-title">自己的数据</div>
            <div class="tile-desc">看清自己账号的表现</div>
          </div>
          <div class="tile t2" id="t2b">
            <span class="tile-icon">🔍</span>
            <div class="tile-label">BENCHMARK</div>
            <div class="tile-title">对标账号</div>
            <div class="tile-desc">学习同类创作者的策略</div>
          </div>
          <div class="tile t3" id="t2c">
            <span class="tile-icon">🚀</span>
            <div class="tile-label">TOPIC</div>
            <div class="tile-title">爆款选题</div>
            <div class="tile-desc">什么内容容易出圈</div>
          </div>
          <div class="tile t4" id="t2d">
            <span class="tile-icon">💬</span>
            <div class="tile-label">COMMENT</div>
            <div class="tile-title">评论洞察</div>
            <div class="tile-desc">用户真正关心什么问题</div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-02', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#stitle-02', { opacity:0, y:16 }, { opacity:1, y:0, duration:0.45, ease:'power3.out' }, 0.55);

        ['#t2a','#t2b','#t2c','#t2d'].forEach((id, i) => {
          tl.fromTo(id,
            { opacity:0, y:40, scale:0.92 },
            { opacity:1, y:0, scale:1, duration:0.42, ease:'power3.out' },
            1.0 + i * 0.35
          );
        });

        tl.to('#t2c', { y:-6, duration:0.25, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.0);

        window.__timelines['02-pain-point'] = tl;
      </script>
    </template>
  </body>
</html>
