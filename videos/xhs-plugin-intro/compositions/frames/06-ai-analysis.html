<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        .topbar {
          position:absolute;top:32px;left:96px;right:96px;
          display:flex;justify-content:space-between;align-items:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        /* 左：AI 标志 */
        .left-ai {
          position:absolute;left:96px;top:160px;width:700px;opacity:0;
        }
        .ai-label {
          font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;margin-bottom:18px;
        }
        .ai-big {
          font-family:'Noto Serif SC',serif;font-size:136px;font-weight:500;
          color:#3a2a1a;line-height:0.9;letter-spacing:-0.03em;
        }
        .ai-sub {
          font-family:'Noto Serif SC',serif;font-size:36px;font-weight:400;
          color:#6a5a4a;margin-top:20px;line-height:1.5;opacity:0;
        }
        /* 竖向分隔线 */
        .divider-v {
          position:absolute;left:900px;top:130px;
          width:2px;height:0;background:#e0d4c8;
        }
        /* 右：五条分析维度 */
        .right-dims {
          position:absolute;right:96px;top:150px;width:820px;
        }
        .dim-row {
          display:flex;align-items:center;gap:16px;
          margin-bottom:20px;opacity:0;
          background:rgba(255,248,240,0.8);border-radius:12px;
          padding:18px 24px;
        }
        .dim-icon { font-size:36px;flex-shrink:0; }
        .dim-text {
          font-family:'Noto Serif SC',serif;font-size:42px;font-weight:500;
          color:#3a2a1a;letter-spacing:-0.01em;flex:1;
        }
        .dim-tag {
          font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;
          letter-spacing:0.12em;text-transform:uppercase;
          background:#e85c7a;color:#fff5f0;
          padding:4px 12px;border-radius:100px;flex-shrink:0;
        }
      </style>

      <div id="root" data-composition-id="06-ai-analysis" data-width="1920" data-height="1080">
        <div id="bg-06" class="clip" data-start="0" data-duration="6" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-06" class="clip" data-start="0" data-duration="6" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.55);"></div>

        <div class="clip topbar" id="topbar-06" data-start="0" data-duration="6" data-track-index="2">
          <span>AI ANALYSIS</span><span>06 / 10</span>
        </div>

        <!-- 左侧 AI 大字 -->
        <div class="clip left-ai" id="lai-06" data-start="0" data-duration="6" data-track-index="3">
          <div class="ai-label">LET AI ANALYZE</div>
          <div class="ai-big">AI<br>帮你<br>分析</div>
          <div class="ai-sub" id="aisub">把筛选好的样本<br>交给 AI 做深度分析</div>
        </div>

        <!-- 竖线 -->
        <div class="clip divider-v" id="div-06" data-start="0" data-duration="6" data-track-index="4"></div>

        <!-- 右侧五条 -->
        <div class="clip right-dims" id="rdims-06" data-start="0" data-duration="6" data-track-index="5"
             style="position:absolute;right:96px;top:130px;width:900px;">
          <div class="dim-row" id="d1">
            <div class="dim-icon">✍️</div>
            <div class="dim-text">标题写法分析</div>
            <div class="dim-tag">TITLE</div>
          </div>
          <div class="dim-row" id="d2">
            <div class="dim-icon">📝</div>
            <div class="dim-text">正文结构拆解</div>
            <div class="dim-tag">STRUCTURE</div>
          </div>
          <div class="dim-row" id="d3">
            <div class="dim-icon">💬</div>
            <div class="dim-text">评论高频问题</div>
            <div class="dim-tag">COMMENTS</div>
          </div>
          <div class="dim-row" id="d4">
            <div class="dim-icon">💡</div>
            <div class="dim-text">爆款评论里的选题</div>
            <div class="dim-tag">INSPIRATION</div>
          </div>
          <div class="dim-row" id="d5">
            <div class="dim-icon">📊</div>
            <div class="dim-text">与自己账号的差距</div>
            <div class="dim-tag">GAP</div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-06', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#lai-06', { opacity:0, x:-30 }, { opacity:1, x:0, duration:0.5, ease:'power3.out' }, 0.6);
        tl.fromTo('#aisub', { opacity:0, y:10 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 1.3);
        tl.fromTo('#div-06', { height:0 }, { height:820, duration:0.5, ease:'power2.inOut' }, 0.9);

        ['#d1','#d2','#d3','#d4','#d5'].forEach((id, i) => {
          tl.fromTo(id,
            { opacity:0, x:40, scale:0.96 },
            { opacity:1, x:0, scale:1, duration:0.38, ease:'power3.out' },
            1.5 + i * 0.32
          );
        });

        tl.to('#d4', { y:-3, duration:0.2, ease:'sine.inOut', yoyo:true, repeat:3 }, 5.1);

        window.__timelines['06-ai-analysis'] = tl;
      </script>
    </template>
  </body>
</html>
