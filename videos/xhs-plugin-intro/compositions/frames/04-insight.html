<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        .topbar {
          position:absolute;top:32px;left:96px;right:96px;
          display:flex;justify-content:space-between;align-items:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.16em;text-transform:uppercase;color:#8a7a6a;opacity:0;
        }
        .center-block {
          position:absolute;left:0;right:0;top:240px;text-align:center;
        }
        .cb-label {
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.18em;text-transform:uppercase;color:#8a7a6a;
          margin-bottom:28px;opacity:0;
        }
        .not-this {
          font-family:'Noto Serif SC',serif;font-size:76px;font-weight:500;
          color:#c8b0a0;text-decoration:line-through;letter-spacing:-0.01em;
          opacity:0;
        }
        .arrow-down {
          font-size:60px;color:#e85c7a;display:block;margin:16px 0;opacity:0;
        }
        .yes-this {
          font-family:'Noto Serif SC',serif;font-size:128px;font-weight:500;
          color:#3a2a1a;line-height:1.0;letter-spacing:-0.03em;
          opacity:0;
        }
        .yes-this span { color:#e85c7a; }
        .rule-h {
          position:absolute;left:480px;top:660px;
          height:2px;background:#e85c7a;width:0;
        }
        .sub-text {
          position:absolute;left:0;right:0;top:696px;text-align:center;
          font-family:'Noto Serif SC',serif;font-size:38px;font-weight:400;
          color:#6a5a4a;line-height:1.5;opacity:0;
        }
      </style>

      <div id="root" data-composition-id="04-insight" data-width="1920" data-height="1080">
        <div id="bg-04" class="clip" data-start="0" data-duration="5" data-track-index="0"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;"></div>
        <div id="mask-04" class="clip" data-start="0" data-duration="5" data-track-index="1"
             style="position:absolute;inset:0;background:rgba(252,246,238,0.6);"></div>

        <div class="clip topbar" id="topbar-04" data-start="0" data-duration="5" data-track-index="2">
          <span>THE INSIGHT</span><span>04 / 10</span>
        </div>

        <div class="clip center-block" id="cblock-04" data-start="0" data-duration="5" data-track-index="3">
          <div class="cb-label" id="cblabel">核心思路</div>
          <div class="not-this" id="notthis">主动批量采集</div>
          <span class="arrow-down" id="arrow">↓</span>
          <div class="yes-this" id="yesthis">被动<span>沉淀</span></div>
        </div>

        <div class="clip rule-h" id="rh-04" data-start="0" data-duration="5" data-track-index="4"></div>

        <div class="clip sub-text" id="sub-04" data-start="0" data-duration="5" data-track-index="5">
          在正常浏览的过程中，顺手把有价值的内容记下来
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.fromTo('#topbar-04', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 0.1);
        tl.fromTo('#cblabel', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.35, ease:'power3.out' }, 0.6);
        tl.fromTo('#notthis', { opacity:0, y:20 }, { opacity:1, y:0, duration:0.45, ease:'power3.out' }, 1.0);
        tl.fromTo('#arrow', { opacity:0, y:-10 }, { opacity:1, y:0, duration:0.3, ease:'power3.out' }, 1.6);
        // "被动沉淀" spring-pop payoff
        tl.fromTo('#yesthis', { opacity:0, scale:0.4, y:20 }, { opacity:1, scale:1, y:0, duration:0.5, ease:'power3.out' }, 2.0);
        tl.fromTo('#rh-04', { width:0 }, { width:960, duration:0.5, ease:'power2.out' }, 2.75);
        tl.fromTo('#sub-04', { opacity:0, y:14 }, { opacity:1, y:0, duration:0.42, ease:'power3.out' }, 3.35);

        // gentle jitter on main word
        tl.to('#yesthis', { y:-4, duration:0.22, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.2);

        window.__timelines['04-insight'] = tl;
      </script>
    </template>
  </body>
</html>
