<!doctype html>
<html lang="zh-CN">
  <head><meta charset="UTF-8" /></head>
  <body>
    <template>
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=JetBrains+Mono:wght@500&display=swap');
        #root { position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;container-type:size; }
        /* 结尾帧：深棕底色，搭配爱心手绘底纹 */
        .eyebrow {
          position:absolute;left:0;right:0;top:220px;
          text-align:center;
          font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;
          letter-spacing:0.18em;text-transform:uppercase;color:#c8b8a8;opacity:0;
        }
        .main-msg {
          position:absolute;left:0;right:0;top:292px;
          text-align:center;
          font-family:'Noto Serif SC',serif;font-size:104px;font-weight:500;
          color:#f5ece0;line-height:1.15;letter-spacing:-0.02em;opacity:0;
        }
        .main-msg .pink { color:#e85c7a; }
        .rule-h {
          position:absolute;left:680px;top:620px;
          height:2px;background:#e85c7a;width:0;
        }
        /* 三个行动项 */
        .actions-wrap {
          position:absolute;left:96px;right:96px;top:660px;
          display:flex;justify-content:center;gap:32px;
        }
        .action-item {
          background:rgba(245,236,224,0.12);border:1.5px solid rgba(245,236,224,0.3);
          border-radius:16px;padding:28px 40px;text-align:center;
          opacity:0;
        }
        .action-icon { font-size:44px;display:block;margin-bottom:10px; }
        .action-text {
          font-family:'Noto Serif SC',serif;font-size:36px;font-weight:500;
          color:#f5ece0;line-height:1.2;
        }
        .action-tag {
          font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;
          letter-spacing:0.14em;text-transform:uppercase;color:#c8b8a8;
          margin-top:6px;
        }
        /* 四角装饰 */
        .corner {
          position:absolute;width:28px;height:28px;
          border-color:rgba(245,236,224,0.3);border-style:solid;opacity:0;
        }
        .ctl { top:48px;left:64px;border-width:2px 0 0 2px; }
        .ctr { top:48px;right:64px;border-width:2px 2px 0 0; }
        .cbl { bottom:48px;left:64px;border-width:0 0 2px 2px; }
        .cbr { bottom:48px;right:64px;border-width:0 2px 2px 0; }
      </style>

      <div id="root" data-composition-id="10-landing" data-width="1920" data-height="1080">
        <!-- 深棕底色 -->
        <div id="bg-10" class="clip" data-start="0" data-duration="6" data-track-index="0"
             style="position:absolute;inset:0;background:#3a2a1a;"></div>
        <!-- bg.png 底纹叠加（低透明度，保留爱心装饰） -->
        <div id="bgtex-10" class="clip" data-start="0" data-duration="6" data-track-index="1"
             style="position:absolute;inset:0;background-image:url('public/bg.png');background-size:cover;background-position:center;opacity:0.12;"></div>

        <!-- 四角装饰 -->
        <div class="clip corner ctl" id="ctl10" data-start="0" data-duration="6" data-track-index="2"></div>
        <div class="clip corner ctr" id="ctr10" data-start="0" data-duration="6" data-track-index="3"></div>
        <div class="clip corner cbl" id="cbl10" data-start="0" data-duration="6" data-track-index="4"></div>
        <div class="clip corner cbr" id="cbr10" data-start="0" data-duration="6" data-track-index="5"></div>

        <div class="clip eyebrow" id="ey-10" data-start="0" data-duration="6" data-track-index="6">DREAMER PIGGY · 小红书内容分析插件</div>

        <div class="clip main-msg" id="mm-10" data-start="0" data-duration="6" data-track-index="7">
          顺手点个 <span class="pink">Star</span><br>帮助更多创作者
        </div>

        <div class="clip rule-h" id="rh-10" data-start="0" data-duration="6" data-track-index="8"></div>

        <div class="clip actions-wrap" id="acts-10" data-start="0" data-duration="6" data-track-index="9"
             style="position:absolute;left:96px;right:96px;top:668px;display:flex;justify-content:center;gap:32px;">
          <div class="action-item" id="a1">
            <span class="action-icon">🐛</span>
            <div class="action-text">提 Issue</div>
            <div class="action-tag">BUG / FEATURE</div>
          </div>
          <div class="action-item" id="a2">
            <span class="action-icon">⭐</span>
            <div class="action-text">点 Star</div>
            <div class="action-tag">GITHUB</div>
          </div>
          <div class="action-item" id="a3">
            <span class="action-icon">🐷</span>
            <div class="action-text">点关注</div>
            <div class="action-tag">@DREAMER PIGGY</div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // 四角装饰入场
        ['#ctl10','#ctr10','#cbl10','#cbr10'].forEach((id, i) => {
          tl.fromTo(id, { opacity:0, scale:0.5 }, { opacity:1, scale:1, duration:0.32, ease:'power3.out' }, 0.15 + i * 0.08);
        });

        tl.fromTo('#ey-10', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.38, ease:'power3.out' }, 0.6);
        tl.fromTo('#mm-10', { opacity:0, y:40 }, { opacity:1, y:0, duration:0.65, ease:'power3.out' }, 1.1);
        tl.fromTo('#rh-10', { width:0 }, { width:560, duration:0.5, ease:'power2.out' }, 2.0);

        ['#a1','#a2','#a3'].forEach((id, i) => {
          tl.fromTo(id, { opacity:0, y:28, scale:0.9 }, { opacity:1, y:0, scale:1, duration:0.42, ease:'power3.out' }, 2.6 + i * 0.32);
        });

        // 中间 Star 小跳
        tl.to('#a2', { y:-5, duration:0.25, ease:'sine.inOut', yoyo:true, repeat:3 }, 4.5);

        window.__timelines['10-landing'] = tl;
      </script>
    </template>
  </body>
</html>
