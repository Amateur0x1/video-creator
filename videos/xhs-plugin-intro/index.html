<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #efe7d4;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="52"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="5.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-pain-point"
        class="scene"
        data-composition-id="02-pain-point"

        data-track-index="1"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-hook", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 5);
        tl.fromTo("#el-02-pain-point", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 5);
        tl.to("#el-03-problem", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 15);
        tl.fromTo("#el-04-insight", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 15);
        tl.to("#el-04-insight", { x: 1920, duration: 0.5, ease: "power3.inOut" }, 20);
        tl.fromTo("#el-05-how-it-works", { x: -1920, opacity: 1 }, { x: 0, duration: 0.5, ease: "power3.inOut" }, 20);
        tl.to("#el-05-how-it-works", { x: 1920, duration: 0.5, ease: "power3.inOut" }, 25);
        tl.fromTo("#el-06-ai-analysis", { x: -1920, opacity: 1 }, { x: 0, duration: 0.5, ease: "power3.inOut" }, 25);
        tl.to("#el-06-ai-analysis", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 31);
        tl.fromTo("#el-07-positioning", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 31);
        tl.to("#el-08-principle", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 41);
        tl.fromTo("#el-09-open-source", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 41);
        tl.to("#el-09-open-source", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 46);
        tl.fromTo("#el-10-landing", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 46);
        tl.to({}, { duration: 52 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
