<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=660" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 660px;
        overflow: hidden;
        background: transparent;
      }
      #root {
        position: absolute; inset: 0;
        width: 1080px; height: 660px;
        overflow: hidden;
      }

      /* ─── 通用字体 ─── */
      .big { font-family: 'Noto Serif SC', serif; font-weight: 700; color: #3a2a1a; letter-spacing: -0.02em; line-height: 1.1; }
      .mid { font-family: 'Noto Serif SC', serif; font-weight: 500; color: #3a2a1a; line-height: 1.35; }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #8a7a6a; }
      .coral { color: #e85c7a; }
      .muted { color: #8a7a6a; }

      /* tag pill */
      .pill {
        display: inline-block;
        font-family: 'JetBrains Mono', monospace;
        font-size: 20px; font-weight: 500; letter-spacing: 0.12em;
        padding: 5px 20px; border-radius: 100px;
      }
      .pill-coral { background: #e85c7a; color: #fcf6ee; }
      .pill-outline { background: transparent; border: 2px solid #c8bfb0; color: #8a7a6a; }
      .pill-dark { background: #3a2a1a; color: #fcf6ee; }

      /* card */
      .card { border-radius: 14px; padding: 22px 28px; }
      .card-dark { background: #3a2a1a; }
      .card-coral { background: #e85c7a; }
      .card-cream { background: #f5ede0; border: 2px solid #e0d4c8; }

      /* ─── SEG 1: 0-3.7s  钩子 ─── */
      #seg1 { position:absolute; inset:0; opacity:0; }
      #s1-label { position:absolute; top:160px; left:0; right:0; text-align:center; opacity:0; }
      #s1-main  { position:absolute; top:210px; left:60px; right:60px; text-align:center; opacity:0; }
      #s1-sub   { position:absolute; top:470px; left:0; right:0; text-align:center; opacity:0; }

      /* ─── SEG 2: 3.7-8.8s  痛点 ─── */
      #seg2 { position:absolute; inset:0; opacity:0; }
      #s2-label { position:absolute; top:160px; left:72px; opacity:0; }
      #s2-title { position:absolute; top:210px; left:72px; right:72px; opacity:0; }
      #s2-cards { position:absolute; top:390px; left:72px; right:72px; display:flex; gap:20px; }
      #s2-c1 { flex:1; opacity:0; }
      #s2-c2 { flex:1; opacity:0; }

      /* ─── SEG 3: 8.8-16.5s  已有方案的问题 ─── */
      #seg3 { position:absolute; inset:0; opacity:0; }
      #s3-label { position:absolute; top:140px; left:72px; opacity:0; }
      #s3-r1 { position:absolute; top:190px; left:72px; right:72px; display:flex; align-items:flex-start; gap:20px; opacity:0; }
      #s3-r2 { position:absolute; top:390px; left:72px; right:72px; display:flex; align-items:flex-start; gap:20px; opacity:0; }

      /* ─── SEG 4: 16.5-23.2s  封控逻辑 ─── */
      #seg4 { position:absolute; inset:0; opacity:0; }
      #s4-label { position:absolute; top:160px; left:72px; opacity:0; }
      #s4-main  { position:absolute; top:210px; left:72px; right:72px; opacity:0; }
      #s4-note  { position:absolute; top:455px; left:72px; right:72px; opacity:0; }

      /* ─── SEG 5: 23.2-29.6s  我的思路 ─── */
      #seg5 { position:absolute; inset:0; opacity:0; }
      #s5-label { position:absolute; top:160px; left:72px; opacity:0; }
      #s5-big   { position:absolute; top:210px; left:72px; right:72px; opacity:0; }
      #s5-rule  { position:absolute; top:500px; left:72px; height:2px; background:#e85c7a; width:0; }
      #s5-sub   { position:absolute; top:522px; left:72px; right:72px; opacity:0; }
    </style>
  </head>
  <body>
    <div id="root"
         data-composition-id="main"
         data-start="0"
         data-duration="29"
         data-width="1080"
         data-height="660">

      <!-- ══ SEG 1: 0-3.7s  钩子 ══ -->
      <div id="seg1" class="clip" data-start="0" data-duration="4" data-track-index="0">
        <div id="s1-label" class="clip label" data-start="0" data-duration="4" data-track-index="1">最近我在研究</div>
        <div id="s1-main" class="clip" data-start="0" data-duration="4" data-track-index="2">
          <span class="big" style="font-size:90px;">如何<span class="coral">安全</span>地<br>用 AI 分析</span><br>
          <span class="big" style="font-size:90px;">小红书帖子</span>
        </div>
        <div id="s1-sub" class="clip muted" data-start="0" data-duration="4" data-track-index="3"
             style="font-family:'Noto Serif SC',serif; font-size:28px; font-weight:400;">
          搞了一圈，发现市面上并没有我需要的解决方案
        </div>
      </div>

      <!-- ══ SEG 2: 3.7-8.8s  痛点 ══ -->
      <div id="seg2" class="clip" data-start="3.7" data-duration="5.1" data-track-index="4">
        <div id="s2-label" class="clip label" data-start="3.7" data-duration="5.1" data-track-index="5">PROBLEM</div>
        <div id="s2-title" class="clip" data-start="3.7" data-duration="5.1" data-track-index="6">
          <span class="big" style="font-size:72px;">要么很贵<span class="muted" style="font-size:52px; font-weight:400;">，</span>要么<span class="coral">不安全</span></span>
        </div>
        <div id="s2-cards" class="clip" data-start="3.7" data-duration="5.1" data-track-index="7">
          <div id="s2-c1" class="card card-dark clip" data-start="3.7" data-duration="5.1" data-track-index="8">
            <div class="label" style="color:#e85c7a; margin-bottom:10px;">COST</div>
            <div class="big" style="font-size:46px; color:#fcf6ee;">很贵</div>
            <div style="font-family:'Noto Serif SC',serif; font-size:22px; color:#c8bfb0; margin-top:8px;">一篇帖子 ≈ 一毛钱</div>
          </div>
          <div id="s2-c2" class="card card-coral clip" data-start="3.7" data-duration="5.1" data-track-index="9">
            <div class="label" style="color:#fcf6ee; margin-bottom:10px;">RISK</div>
            <div class="big" style="font-size:46px; color:#fcf6ee;">不安全</div>
            <div style="font-family:'Noto Serif SC',serif; font-size:22px; color:#fcf6ee; opacity:0.85; margin-top:8px;">数据经过三方 API</div>
          </div>
        </div>
      </div>

      <!-- ══ SEG 3: 8.8-16.5s  已有方案的缺陷 ══ -->
      <div id="seg3" class="clip" data-start="8.8" data-duration="7.7" data-track-index="10">
        <div id="s3-label" class="clip label" data-start="8.8" data-duration="7.7" data-track-index="11">EXISTING SOLUTIONS</div>

        <div id="s3-r1" class="clip" data-start="8.8" data-duration="7.7" data-track-index="12">
          <div class="pill pill-dark" style="flex-shrink:0; margin-top:8px;">方案 A</div>
          <div class="card card-cream" style="flex:1; padding:18px 24px;">
            <div class="mid" style="font-size:32px; font-weight:700; color:#3a2a1a; margin-bottom:6px;">三方 API 调接口</div>
            <div class="muted" style="font-family:'Noto Serif SC',serif; font-size:24px;">一篇帖子一毛钱 · 成本高</div>
          </div>
        </div>

        <div id="s3-r2" class="clip" data-start="8.8" data-duration="7.7" data-track-index="13">
          <div class="pill pill-coral" style="flex-shrink:0; margin-top:8px;">方案 B</div>
          <div class="card card-cream" style="flex:1; padding:18px 24px;">
            <div class="mid" style="font-size:32px; font-weight:700; color:#3a2a1a; margin-bottom:6px;">本地爬虫爬小红书</div>
            <div style="font-family:'Noto Serif SC',serif; font-size:24px; color:#e85c7a; font-weight:500;">很快就被<span style="font-weight:700;">封控</span>了 ✗</div>
          </div>
        </div>
      </div>

      <!-- ══ SEG 4: 16.5-23.2s  封控逻辑 ══ -->
      <div id="seg4" class="clip" data-start="16.5" data-duration="6.7" data-track-index="14">
        <div id="s4-label" class="clip label" data-start="16.5" data-duration="6.7" data-track-index="15">WHY 封控</div>
        <div id="s4-main" class="clip" data-start="16.5" data-duration="6.7" data-track-index="16">
          <span class="big" style="font-size:76px;">小红书封控逻辑<br>其实很<span class="coral">简单</span></span>
        </div>
        <div id="s4-note" class="clip" data-start="16.5" data-duration="6.7" data-track-index="17">
          <span style="font-family:'Noto Serif SC',serif; font-size:30px; font-weight:400; color:#8a7a6a;">用户做了一场</span>
          <span class="pill pill-coral" style="font-size:24px; margin-left:12px; vertical-align:middle;">异常行为</span>
          <span style="font-family:'Noto Serif SC',serif; font-size:30px; font-weight:400; color:#8a7a6a; margin-left:12px;">→ 触发封控</span>
        </div>
      </div>

      <!-- ══ SEG 5: 23.2-29.6s  我的思路 ══ -->
      <div id="seg5" class="clip" data-start="23.2" data-duration="6.4" data-track-index="18">
        <div id="s5-label" class="clip label" data-start="23.2" data-duration="6.4" data-track-index="19">MY SOLUTION</div>
        <div id="s5-big" class="clip" data-start="23.2" data-duration="6.4" data-track-index="20">
          <span class="big" style="font-size:78px;">用户<span class="coral">正常阅读</span>帖子<br>我在旁<span class="coral">捕获数据</span></span>
        </div>
        <div id="s5-rule" class="clip" data-start="23.2" data-duration="6.4" data-track-index="21"></div>
        <div id="s5-sub" class="clip" data-start="23.2" data-duration="6.4" data-track-index="22">
          <span style="font-family:'Noto Serif SC',serif; font-size:27px; font-weight:400; color:#8a7a6a;">截获小红书向用户发送的数据 · 用户行为完全正常 · 不触发封控</span>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ── SEG 1: 0-3.7s 钩子 ── */
      tl.set('#seg1', { opacity:1 }, 0);
      tl.fromTo('#s1-label', { opacity:0, y:-10 }, { opacity:1, y:0, duration:0.35, ease:'power3.out' }, 0.1);
      tl.fromTo('#s1-main', { opacity:0, y:30 }, { opacity:1, y:0, duration:0.55, ease:'power3.out' }, 0.4);
      tl.fromTo('#s1-sub', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.4, ease:'power3.out' }, 1.6);
      tl.to('#seg1', { opacity:0, duration:0.3, ease:'power2.in' }, 3.4);
      tl.set('#seg1', { opacity:0 }, 3.7);

      /* ── SEG 2: 3.7-8.8s 痛点 ── */
      tl.set('#seg2', { opacity:1 }, 3.7);
      tl.fromTo('#s2-label', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.3, ease:'power3.out' }, 3.8);
      tl.fromTo('#s2-title', { opacity:0, x:-20 }, { opacity:1, x:0, duration:0.45, ease:'power3.out' }, 4.1);
      tl.fromTo('#s2-c1', { opacity:0, y:24, scale:0.93 }, { opacity:1, y:0, scale:1, duration:0.38, ease:'power3.out' }, 5.0);
      tl.fromTo('#s2-c2', { opacity:0, y:24, scale:0.93 }, { opacity:1, y:0, scale:1, duration:0.38, ease:'power3.out' }, 5.45);
      tl.to('#s2-c2', { y:-5, duration:0.28, ease:'sine.inOut', yoyo:true, repeat:3 }, 7.2);
      tl.to('#seg2', { opacity:0, duration:0.3, ease:'power2.in' }, 8.5);
      tl.set('#seg2', { opacity:0 }, 8.8);

      /* ── SEG 3: 8.8-16.5s 已有方案 ── */
      tl.set('#seg3', { opacity:1 }, 8.8);
      tl.fromTo('#s3-label', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.3, ease:'power3.out' }, 8.9);
      tl.fromTo('#s3-r1', { opacity:0, x:28 }, { opacity:1, x:0, duration:0.42, ease:'power3.out' }, 9.3);
      tl.fromTo('#s3-r2', { opacity:0, x:28 }, { opacity:1, x:0, duration:0.42, ease:'power3.out' }, 12.5);
      tl.to('#s3-r2', { x:4, duration:0.18, ease:'sine.inOut', yoyo:true, repeat:3 }, 15.5);
      tl.to('#seg3', { opacity:0, duration:0.3, ease:'power2.in' }, 16.2);
      tl.set('#seg3', { opacity:0 }, 16.5);

      /* ── SEG 4: 16.5-23.2s 封控逻辑 ── */
      tl.set('#seg4', { opacity:1 }, 16.5);
      tl.fromTo('#s4-label', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.3, ease:'power3.out' }, 16.6);
      tl.fromTo('#s4-main', { opacity:0, y:28 }, { opacity:1, y:0, duration:0.55, ease:'power3.out' }, 16.9);
      tl.fromTo('#s4-note', { opacity:0, y:16 }, { opacity:1, y:0, duration:0.42, ease:'power3.out' }, 19.5);
      tl.to('#seg4', { opacity:0, duration:0.3, ease:'power2.in' }, 22.9);
      tl.set('#seg4', { opacity:0 }, 23.2);

      /* ── SEG 5: 23.2-29.6s 我的思路 ── */
      tl.set('#seg5', { opacity:1 }, 23.2);
      tl.fromTo('#s5-label', { opacity:0, y:-8 }, { opacity:1, y:0, duration:0.3, ease:'power3.out' }, 23.3);
      tl.fromTo('#s5-big', { opacity:0, y:30 }, { opacity:1, y:0, duration:0.58, ease:'power3.out' }, 23.6);
      tl.fromTo('#s5-rule', { width:0 }, { width:480, duration:0.5, ease:'power2.inOut' }, 25.5);
      tl.fromTo('#s5-sub', { opacity:0, y:12 }, { opacity:1, y:0, duration:0.42, ease:'power3.out' }, 26.1);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
