<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[视频封面]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500&display=swap" rel="stylesheet">
<!-- html2canvas for export -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<!-- 图片 base64 内联（解决 file:// 协议下 tainted canvas 问题）-->
<script src="../assets/images-b64.js"></script>
<style>
@font-face {
  font-family: 'LXGWWenKai';
  src: url('../assets/fonts/lxgw-wenkai-v1.522/LXGWWenKai-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a1510;
  -webkit-font-smoothing: antialiased;
}

/* ── 居中容器 ── */
.cover-viewport {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── 卡片（1055×1491，截图区域）── */
.card {
  position: relative;
  width: 1055px;
  height: 1491px;
  background-image: url('../assets/bg.png');
  background-size: 1055px 1491px;
  background-repeat: no-repeat;
  background-position: top center;
  overflow: hidden;
  flex-shrink: 0;
  transform-origin: center center;
}

/* ── 封面布局 ── */
.content-cover {
  position: absolute;
  top: 0;
  left: 0;
  width: 1055px;
  bottom: 0;
  overflow: visible;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 20px;
  padding-bottom: 60px;
  gap: 0;
}

/* 封面插图（透明 PNG，建议 900×900）*/
.cover-illustration {
  width: 900px;
  height: 900px;
  object-fit: contain;
  display: block;
  margin-top: -40px;
  margin-bottom: -120px;
  filter: drop-shadow(0 8px 32px rgba(180,140,100,0.18));
}

/* 封面文字区 */
.cover-text {
  width: 804px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0;
}

/* 标题 */
.p-title {
  font-family: 'Noto Serif SC', Georgia, serif;
  font-size: 80px;
  font-weight: 500;
  line-height: 115px;
  color: #000;
  letter-spacing: 0;
  margin: 0 0 16px;
}

/* 副标题/导语 */
.p-subtitle {
  font-family: 'LXGWWenKai', 'PingFang SC', sans-serif;
  font-size: 52px;
  font-weight: 400;
  line-height: 82px;
  color: #5a4a3a;
  margin: 0;
}

/* 下划线高亮（粉色）*/
.hl {
  position: relative;
  display: inline;
  text-decoration: none;
}
.hl::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: 4px;
  height: 5px;
  background: #f5b0c0;
  border-radius: 3px;
  z-index: -1;
}
.p-title .hl::after {
  height: 8px;
  bottom: 8px;
}

/* 封面标签胶囊 */
.cover-tag {
  font-family: 'LXGWWenKai', 'PingFang SC', sans-serif;
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: #b8a090;
  background: rgba(245,176,192,0.18);
  border: 1px solid rgba(245,176,192,0.45);
  border-radius: 20px;
  padding: 6px 22px;
  margin-bottom: 28px;
  display: inline-block;
}

/* 封面分割线 */
.cover-divider {
  width: 100%;
  height: 1.5px;
  background: linear-gradient(90deg, rgba(180,140,110,0.35) 0%, rgba(180,140,110,0.08) 100%);
  margin-top: 32px;
  margin-bottom: 22px;
}

/* 封面作者信息 */
.cover-author {
  font-family: 'LXGWWenKai', 'PingFang SC', sans-serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: #b8a090;
  display: flex;
  align-items: center;
  gap: 16px;
}
.cover-author-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #d4b896;
  display: inline-block;
}

/* ── 导出按钮 ── */
#export-btn {
  position: fixed;
  top: 18px; right: 18px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255,255,255,0.26);
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
  user-select: none;
  z-index: 500;
}
#export-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.08); }
#export-btn:active { transform: scale(0.94); }

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 54px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(30,24,20,0.88);
  color: #fff;
  font-family: 'LXGWWenKai', 'PingFang SC', sans-serif;
  font-size: 14px; letter-spacing: 0.06em;
  padding: 9px 20px; border-radius: 20px;
  pointer-events: none; z-index: 999;
  opacity: 0; transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 导出遮罩 ── */
.export-mask {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.50);
  backdrop-filter: blur(2px);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.export-mask.visible { opacity: 1; pointer-events: all; }
.export-spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(0,0,0,0.12);
  border-top-color: #e8879a;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="cover-viewport">
<div class="card" id="card">
  <div class="content-cover">
    <!-- 封面插图：替换为你的透明 PNG，建议尺寸 900×900 -->
    <img class="cover-illustration" src="../assets/piggy_transparent.png" alt="封面插图" />
    <div class="cover-text">
      <!-- 标签胶囊：描述内容类型 -->
      <span class="cover-tag">[类型标签 · 副标签]</span>
      <!-- 主标题：可用 <span class="hl"> 高亮关键词 -->
      <h1 class="p-title">[视频<span class="hl">主标题</span>]</h1>
      <!-- 副标题/导语 -->
      <p class="p-subtitle">[一句话导语，概括视频核心内容……]</p>
      <div class="cover-divider"></div>
      <div class="cover-author">
        <span>[作者名]</span>
        <span class="cover-author-dot"></span>
        <span>[年份]</span>
      </div>
    </div>
  </div>
  <div class="export-mask"><div class="export-spinner"></div></div>
</div>
</div>

<!-- 导出按钮 -->
<button id="export-btn" title="导出封面 PNG">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
</button>

<div id="toast"></div>

<script>
/* ── 导出功能 ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('export-btn').addEventListener('click', async () => {
  const card = document.getElementById('card');
  const mask = card.querySelector('.export-mask');
  mask.classList.add('visible');

  try {
    // 替换 CSS 背景图为 base64（如果有）
    if (window.IMAGES_B64 && window.IMAGES_B64['bg.png']) {
      card.style.backgroundImage = `url(${window.IMAGES_B64['bg.png']})`;
    }
    // 替换封面插图为 base64（如果有）
    const img = card.querySelector('.cover-illustration');
    if (img && window.IMAGES_B64) {
      const filename = img.src.split('/').pop();
      if (window.IMAGES_B64[filename]) {
        img.src = window.IMAGES_B64[filename];
      }
    }

    const canvas = await html2canvas(card, {
      width: 1055,
      height: 1491,
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: null,
    });

    const link = document.createElement('a');
    link.download = 'cover.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('封面已导出 ✓');
  } catch (e) {
    showToast('导出失败: ' + e.message);
  } finally {
    mask.classList.remove('visible');
  }
});
</script>
</body>
</html>
